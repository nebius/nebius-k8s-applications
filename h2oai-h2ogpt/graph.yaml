releaseType: "k8s"
components:
  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.h2ogpt.storage.size: "parameters.h2ogptStorageSize"
      componentSpec:
        productSlug: "nebius/h2ogpt"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "h2ogpt-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the h2oGPT deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the h2oGPT deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the h2oGPT deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "h2ogptStorageSize":
    type: "string"
    description: "Value for Helm key 'h2ogpt.storage.size'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    h2ogptStorageSize: 'h2ogpt.storage.size'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
