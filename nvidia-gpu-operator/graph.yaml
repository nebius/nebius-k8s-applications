releaseType: "k8s"
components:
  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.driver.version: "parameters.driverVersion"
      componentSpec:
        productSlug: "nebius/nvidia-gpu-operator"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "nvidia-gpu-operator-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the NVIDIA® GPU Operator deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the NVIDIA® GPU Operator deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the NVIDIA® GPU Operator deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "driverVersion":
    type: "string"
    description: "Value for Helm key 'driver.version'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    driverVersion: 'driver.version'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
