releaseType: "k8s"
components:
  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.authentication.apikey.allowed_keys: "parameters.authenticationApikeyAllowedKeys"
        values.authentication.apikey.users: "parameters.authenticationApikeyUsers"
        values.modules.text2vec-contextionary.enabled: "parameters.modulesText2vecContextionaryEnabled"
        values.modules.text2vec-gpt4all.enabled: "parameters.modulesText2vecGpt4allEnabled"
        values.modules.text2vec-transformers.enabled: "parameters.modulesText2vecTransformersEnabled"
      componentSpec:
        productSlug: "nebius/weaviate"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "weaviate-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the Weaviate deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the Weaviate deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the Weaviate deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "authenticationApikeyAllowedKeys":
    type: "string"
    description: "Value for Helm key 'authentication.apikey.allowed_keys'."

  "authenticationApikeyUsers":
    type: "string"
    description: "Value for Helm key 'authentication.apikey.users'."

  "modulesText2vecContextionaryEnabled":
    type: "bool"
    description: "Value for Helm key 'modules.text2vec-contextionary.enabled'."

  "modulesText2vecGpt4allEnabled":
    type: "bool"
    description: "Value for Helm key 'modules.text2vec-gpt4all.enabled'."

  "modulesText2vecTransformersEnabled":
    type: "bool"
    description: "Value for Helm key 'modules.text2vec-transformers.enabled'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    authenticationApikeyAllowedKeys: 'authentication.apikey.allowed_keys'
    authenticationApikeyUsers: 'authentication.apikey.users'
    modulesText2vecContextionaryEnabled: 'modules.text2vec-contextionary.enabled'
    modulesText2vecGpt4allEnabled: 'modules.text2vec-gpt4all.enabled'
    modulesText2vecTransformersEnabled: 'modules.text2vec-transformers.enabled'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
