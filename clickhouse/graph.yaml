releaseType: "k8s"
components:
  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.auth.password: "parameters.authPassword"
        values.auth.username: "parameters.authUsername"
        values.persistence.size: "parameters.persistenceSize"
      componentSpec:
        productSlug: "nebius/clickhouse"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "clickhouse-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the ClickHouse deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the ClickHouse deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the ClickHouse deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "authPassword":
    type: "string"
    description: "Value for Helm key 'auth.password'."

  "authUsername":
    type: "string"
    description: "Value for Helm key 'auth.username'."

  "persistenceSize":
    type: "string"
    description: "Value for Helm key 'persistence.size'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    # NOTE: use 'auth\\.password' because the input key name contains a dot.
    authPassword: 'auth\\.password'
    # NOTE: use 'auth\\.username' because the input key name contains a dot.
    authUsername: 'auth\\.username'
    # NOTE: use 'persistence\\.size' because the input key name contains a dot.
    persistenceSize: 'persistence\\.size'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
