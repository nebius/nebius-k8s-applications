releaseType: "k8s"
components:
  endpoint001:
    type: "endpoint"
    spec:
      refMap:
        clusterId: "components.cluster001.state.result.id"
        helmReleaseName: "parameters.releaseName"
        helmReleaseNamespace: "parameters.releaseNamespace"
      componentSpec:
        ports: []
    dependencies:
      components:
        helmchart001:

  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.env.COMFY_TAG: "parameters.envCOMFYTAG"
        values.env.MANAGER_TAG: "parameters.envMANAGERTAG"
        values.resources.additional.cpu: "parameters.resourcesAdditionalCpu"
        values.resources.additional.memory: "parameters.resourcesAdditionalMemory"
        values.resources.additional.storage_size: "parameters.resourcesAdditionalStorageSize"
        values.resources.gpu_count: "parameters.resourcesGpuCount"
        values.resources.gpu_selector: "parameters.resourcesGpuSelector"
      componentSpec:
        productSlug: "nebius/comfy-ui"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "comfy-ui-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint:


parameters:
  "parentId":
    type: "string"
    description: "The project ID for the ComfyUI deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the ComfyUI deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the ComfyUI deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "envCOMFYTAG":
    type: "string"
    description: "Value for Helm key 'env.COMFY_TAG'."

  "envMANAGERTAG":
    type: "string"
    description: "Value for Helm key 'env.MANAGER_TAG'."

  "resourcesAdditionalCpu":
    type: "number"
    description: "Value for Helm key 'resources.additional.cpu'."

  "resourcesAdditionalMemory":
    type: "number"
    description: "Value for Helm key 'resources.additional.memory'."

  "resourcesAdditionalStorageSize":
    type: "number"
    description: "Value for Helm key 'resources.additional.storage_size'."

  "resourcesGpuCount":
    type: "number"
    description: "Value for Helm key 'resources.gpu_count'."

  "resourcesGpuSelector":
    type: "string"
    description: "Value for Helm key 'resources.gpu_selector'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    envCOMFYTAG: 'env.COMFY_TAG'
    envMANAGERTAG: 'env.MANAGER_TAG'
    resourcesAdditionalCpu: 'resources.additional.cpu'
    resourcesAdditionalMemory: 'resources.additional.memory'
    resourcesAdditionalStorageSize: 'resources.additional.storage_size'
    resourcesGpuCount: 'resources.gpu_count'
    resourcesGpuSelector: 'resources.gpu_selector'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
