releaseType: "k8s"
components:
  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "osmo-cluster"
          spec:
            control_plane:
              endpoints:
                public_endpoint: {}
  s3_bucket001:
    type: "s3_bucket"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.bucketId"
      componentSpec:
        api_spec:
          metadata: {}

  service_account001:
    type: "service_account"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
      componentSpec:
        api_spec:
          metadata:
            name: '${{ printf "%s-osmo-s3-sa-%s" .parameters.releaseName (randchar 5) | trunc 63 | trimSuffix "-" }}'
          spec:
            description: "Service account for OSMO S3 integration"

  sa_access_key001:
    type: "sa_access_key"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.spec.account.serviceAccount.id: "components.service_account001.state.result.id"
      componentSpec:
        api_spec:
          metadata: {}
          spec:
            account:
              serviceAccount: {}
    dependencies:
      components:
        service_account001:

  access_binding001:
    type: "access_binding"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.spec.subjectId: "components.service_account001.state.result.id"
        api_spec.spec.resourceId: "components.s3_bucket001.state.result.bucket.metadata.id"
      componentSpec:
        api_spec:
          metadata:
            name: '${{ printf "%s-s3-access-binding-%s" .parameters.releaseName (randchar 5) | trunc 63 | trimSuffix "-" }}'
          spec:
            role: "storage.object-editor"
    dependencies:
      components:
        service_account001:
        s3_bucket001:

  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        rawValues: "parameters.rawValues"
      componentSpec:
        productSlug: "nebius/nvidia-osmo"
        values:
          workflowData:
            bucket: '${{ .components.s3_bucket001.state.result.bucket.metadata.name }}'
            accessKeyId: '${{ .components.sa_access_key001.state.result.accessKey.status.awsAccessKeyId }}'
            accessKey: '${{ .components.sa_access_key001.state.result.accessKey.status.secret }}'
            endpoint: '${{ .components.s3_bucket001.state.result.bucket.status.domainName }}'
          osmo:
            dbPassword: '${{ .parameters.osmoDbPassword }}'
            redisPassword: '${{ .parameters.osmoRedisPassword }}'
          keycloak:
            adminPassword: '${{ .parameters.osmoKeycloakPassword }}'
          web-ui:
            services:
              ui:
                hostname: '${{ .parameters.hostname }}'
          router:
            services:
              service:
                hostname: '${{ .parameters.hostname }}'
          backend-operator:
            global:
              serviceUrl: '${{ .parameters.backendOperatorServiceUrl }}'
          service:
            services:
              service:
                hostname: '${{ .parameters.hostname }}'
                extraEnv:
                  - name: AWS_ENDPOINT_URL_S3
                    value: '${{ printf "https://%s:443" .components.s3_bucket001.state.result.bucket.status.domainName }}'
                  - name: OSMO_SKIP_DATA_AUTH
                    value: '1'
                  - name: AWS_S3_FORCE_PATH_STYLE
                    value: 'true'
                  - name: AWS_DEFAULT_REGION
                    value: '${{ .components.s3_bucket001.state.result.bucket.status.region }}'
              worker:
                extraEnv:
                  - name: AWS_ENDPOINT_URL_S3
                    value: '${{ printf "https://%s:443" .components.s3_bucket001.state.result.bucket.status.domainName }}'
                  - name: OSMO_SKIP_DATA_AUTH
                    value: '1'
                  - name: AWS_S3_FORCE_PATH_STYLE
                    value: 'true'
                  - name: AWS_DEFAULT_REGION
                    value: '${{ .components.s3_bucket001.state.result.bucket.status.region }}'
    dependencies:
      components:
        cluster001:
        s3_bucket001:
        sa_access_key001:
        access_binding001:

  endpoint001:
    type: "endpoint"
    spec:
      refMap:
        clusterId: "components.cluster001.state.result.id"
        helmReleaseName: "parameters.releaseName"
        helmReleaseNamespace: "parameters.releaseNamespace"
      componentSpec:
        ports: []
    dependencies:
      components:
        helmchart001:


parameters:
  "parentId":
    type: "string"
    description: "The project ID for the OSMO deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the OSMO deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the OSMO deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "rawValues":
    type: "string"
    description: "Helm values YAML (compose mode)."

  "bucketId":
    type: "string"
    description: "Selected S3 bucket resource ID for OSMO workflow data."

  "osmoDbPassword":
    type: "string"
    description: "Value for Helm key 'osmo.dbPassword'."

  "osmoRedisPassword":
    type: "string"
    description: "Value for Helm key 'osmo.redisPassword'."

  "osmoKeycloakPassword":
    type: "string"
    description: "Value for Helm key 'keycloak.auth.adminPassword'."

  "hostname":
    type: "string"
    description: "Hostname shared by service, web-ui, and router components."

  "backendOperatorServiceUrl":
    type: "string"
    description: "Value for Helm key 'backend-operator.global.serviceUrl'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
    bucketId: "setup.app_settings.bucketId"
    osmoDbPassword: "setup.app_settings.osmoDbPassword"
    osmoRedisPassword: "setup.app_settings.osmoRedisPassword"
    osmoKeycloakPassword: "setup.app_settings.osmoKeycloakPassword"
    hostname: "setup.app_settings.hostname"
    backendOperatorServiceUrl: "setup.app_settings.backendOperatorServiceUrl"
    rawValues: "setup.compose.data"
