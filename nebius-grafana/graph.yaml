apiVersion: v1
releaseType: "k8s"

components:
  cluster001:
    type: "mk8s_cluster"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
          id: "${{ .parameters.clusterId }}"
          name: "${{ .parameters.clusterName }}"
        spec:
          control_plane:
            endpoints:
              public_endpoint:

  sa001:
    type: "service_account"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
          id: "${{ .parameters.serviceAccountId }}"
          name: "grafana-solution-by-nebius-sa"
        spec:
          description: "Service account for Grafana solution by Nebius"
    dependencies:
      components:
        cluster001:

  member001:
    type: "group_membership"
    spec:
      serviceAccountId: "${{ .components.sa001.state.result.id }}"
      parentId: "${{ .parameters.parentId }}"
      groups: ["viewers"]
    dependencies:
      components:
        sa001:

  token001:
    type: "static_token"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
          name: "grafana-solution-by-nebius-static-key"
        spec:
          service: "OBSERVABILITY"
          account:
            serviceAccount:
              id: "${{ .components.sa001.state.result.id }}"
    dependencies:
      components:
        member001:

  binding001:
    type: "access_binding"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
        spec:
          subjectId: "${{ .components.sa001.state.result.id }}"
          resourceId: "${{ .parameters.parentId }}"
          role: "applicationtunnel.agent"
    dependencies:
      components:
        sa001:

  rsakeypair001:
    type: "rsa_key_pair"
    spec:
      bitSize: 4096

  iamauthpubkey001:
    type: "iam_auth_public_key"
    spec:
      parentId: "${{ .parameters.parentId }}"
      serviceAccountId: "${{ .components.sa001.state.result.id }}"
      publicKey: "${{ .components.rsakeypair001.state.result.publicKey }}"
    dependencies:
      components:
        sa001:
        rsakeypair001:

  tunnel001:
    type: "application_tunnel"
    spec:
      parentId: "${{ .parameters.parentId }}"
      services:
        - "grafana"

  helmchart001:
    type: "helm_chart"
    spec:
      parentId: "${{ .parameters.parentId }}"
      clusterId: "${{ .components.cluster001.state.result.id }}"
      releaseName: "${{ .parameters.releaseName }}"
      releaseNamespace: "${{ .parameters.releaseNamespace }}"
      rawValues: "${{ .parameters.rawValues }}"
      productSlug: "nebius/grafana-solution-by-nebius"
      values:
        grafana:
          adminPassword: "${{ .parameters.grafanaAdminPassword }}"
          nebius:
            accessToken: "${{ .components.token001.state.result.token }}"
            projectId: "${{ .parameters.parentId }}"
          grafana.ini:
            server:
              domain: "${{ .components.tunnel001.state.result.serviceAddresses.grafana }}"
              root_url: "https://${{ .components.tunnel001.state.result.serviceAddresses.grafana }}"
            security:
              cookie_samesite: disabled
              csrf_trusted_origins: "${{ .components.tunnel001.state.result.serviceAddresses.grafana }}"
            live:
              allowed_origins: "https://${{ .components.tunnel001.state.result.serviceAddresses.grafana }}"
        tunna-agent:
          enabled: true
          config:
            tunnel_id: "${{ .components.tunnel001.state.result.tunnelId }}"
            server_addr: "${{ .components.tunnel001.state.result.address }}"
            iam:
              domain: "${{ .components.tunnel001.state.result.iamDomain }}"
              service_account:
                service_account_id: "${{ .components.sa001.state.result.id }}"
                public_key_id: "${{ .components.iamauthpubkey001.state.result.publicKeyId }}"
                private_key_path: "/etc/tunna/agent/sa/private_key.pem"
            services:
              - name: "grafana"
                target: '${{ if contains .parameters.releaseName "grafana" }}${{ .parameters.releaseName | trunc 63 | trimSuffix "-" }}${{ else }}${{ printf "%s-grafana" .parameters.releaseName | trunc 63 | trimSuffix "-" }}${{ end }}:80'
                type: "http"
          secret:
            data:
              sa-private-key: "${{ .components.rsakeypair001.state.result.privateKey }}"
            items:
              - key: sa-private-key
                path: sa/private_key.pem
    dependencies:
      components:
        token001:
        cluster001:
        tunnel001:
        rsakeypair001:
        iamauthpubkey001:
        binding001:

parameters:
  "parentId":
    type: "string"
    description: "The project ID for the Grafana® solution by Nebius deployment."

  "serviceAccountId":
    type: "string"
    description: "Existing service account ID to use for creating an Observability static key."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the Grafana® solution by Nebius deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the Grafana® solution by Nebius deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "rawValues":
    type: "string"
    description: "Helm values YAML (compose mode)."

  "grafanaAdminPassword":
    type: "string"
    description: "Value for Helm key 'grafana.adminPassword'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    serviceAccountId: "setup.app_settings.serviceAccount"
    grafanaAdminPassword: "setup.app_settings.adminPassword"
    rawValues: "setup.compose.data"
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
