releaseType: "k8s"
components:
  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.imagePullSecret.password: "parameters.imagePullSecretPassword"
        values.jupyterhub.hub.config.DummyAuthenticator.password: "parameters.jupyterhubHubConfigDummyAuthenticatorPassword"
        values.jupyterhub.proxy.service.type: "parameters.jupyterhubProxyServiceType"
        values.jupyterhub.singleuser.storage.capacity: "parameters.jupyterhubSingleuserStorageCapacity"
        values.nfs.nfs_pv_size: "parameters.nfsNfsPvSize"
      componentSpec:
        productSlug: "nebius/generative-virtual-screening"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "generative-virtual-screening-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the Nvidia Blueprint Generative Virtual Screening deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the Nvidia Blueprint Generative Virtual Screening deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the Nvidia Blueprint Generative Virtual Screening deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "imagePullSecretPassword":
    type: "string"
    description: "Value for Helm key 'imagePullSecret.password'."

  "jupyterhubHubConfigDummyAuthenticatorPassword":
    type: "string"
    description: "Value for Helm key 'jupyterhub.hub.config.DummyAuthenticator.password'."

  "jupyterhubProxyServiceType":
    type: "string"
    description: "Value for Helm key 'jupyterhub.proxy.service.type'."

  "jupyterhubSingleuserStorageCapacity":
    type: "string"
    description: "Value for Helm key 'jupyterhub.singleuser.storage.capacity'."

  "nfsNfsPvSize":
    type: "string"
    description: "Value for Helm key 'nfs.nfs_pv_size'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    imagePullSecretPassword: 'imagePullSecret.password'
    jupyterhubHubConfigDummyAuthenticatorPassword: 'jupyterhub.hub.config.DummyAuthenticator.password'
    jupyterhubProxyServiceType: 'jupyterhub.proxy.service.type'
    jupyterhubSingleuserStorageCapacity: 'jupyterhub.singleuser.storage.capacity'
    nfsNfsPvSize: 'nfs.nfs_pv_size'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
