apiVersion: v1
kind: ConfigMap
metadata:
  name: nebius-nvcf-patches
data:
  wait-and-run.sh: |
    #!/bin/bash
    set -e
    
    # Function to wait for deployment
    wait_for_deployment() {
      local deployment=$1
      local namespace=$2
      local timeout=$3
      
      echo "$(date): Waiting for deployment $deployment in namespace $namespace..."
      
      # Wait for deployment to exist
      until kubectl get deployment $deployment -n $namespace &>/dev/null; do
        echo "$(date): Deployment $deployment does not exist yet. Waiting..."
        sleep 5
      done
      
      echo "$(date): Deployment $deployment is fully ready!"
    }
    
    # Main execution
    echo "$(date): Starting kubectl job..."
    
    # Wait for deployment
    wait_for_deployment "$DEPLOYMENT_NAME" "$NAMESPACE" "$TIMEOUT"
    
    # Run kubectl commands
    echo "$(date): Running post-deployment commands..."
    
    # Command 1: Get deployment status
    echo "$(date): Getting deployment details..."
    kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE -o wide
    
    # Command 4: Custom commands from environment variable
    if [ ! -z "$CUSTOM_COMMANDS" ]; then
      echo "$(date): Running custom commands..."
      eval "$CUSTOM_COMMANDS"
    fi
    
    echo "$(date): All commands completed successfully!"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nebius-nvcf-patches-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nebius-nvcf-patches-role
rules:
# Adjust permissions based on your needs
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nebius-nvcf-patches-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nebius-nvcf-patches-role
subjects:
- kind: ServiceAccount
  name: nebius-nvcf-patches-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nebius-nvcf-patches-{{ .Chart.Version }}
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600  # 1 hour timeout for the entire job
  template:
    spec:
      serviceAccountName: nebius-nvcf-patches-sa
      restartPolicy: OnFailure
      containers:
      - name: kubectl-runner
        image: bitnami/kubectl:latest
        command: ["/bin/bash", "/scripts/wait-and-run.sh"]
        env:
        - name: DEPLOYMENT_NAME
          value: "nvca"
        - name: NAMESPACE
          value: "nvca-system"
        - name: TIMEOUT
          value: "300s"
        - name: CUSTOM_COMMANDS
          value: |
            echo "Running custom commands..."
            nvcf_cluster_name="$(kubectl get nvcfbackends -n nvca-operator -o name | cut -d'/' -f2)"
            
            kubectl patch nvcfbackends.nvcf.nvidia.io -n nvca-operator "$nvcf_cluster_name" --type='merge' -p='{"spec":{"overrides":{"featureGate":{"values":["LogPosting","HelmSharedStorage","CachingSupport"]}}}}'
            
            kubectl patch nvcfbackends.nvcf.nvidia.io -n nvca-operator "$nvcf_cluster_name" --type='merge' -p='{"spec":{"overrides":{"featureGate":{"cacheCSIVolumeMountOptionsConfig":{"disabled":true}}}}}'
            
            kubectl patch -n nvca-system deployments nvca --type='json' -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value":"--worker-degradation-period=3h"}]'
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: scripts
        configMap:
          name: nebius-nvcf-patches
          defaultMode: 0755
