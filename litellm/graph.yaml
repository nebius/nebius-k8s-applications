releaseType: "k8s"
components:
  endpoint001:
    type: "endpoint"
    spec:
      refMap:
        clusterId: "components.cluster001.state.result.id"
        helmReleaseName: "parameters.releaseName"
        helmReleaseNamespace: "parameters.releaseNamespace"
      componentSpec:
        ports: []
    dependencies:
      components:
        helmchart001:

  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.masterkey: "parameters.masterkey"
        values.proxy_config.model_list: "parameters.proxyConfigModelList"
      componentSpec:
        productSlug: "berriai/litellm"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "litellm-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the LiteLLM deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the LiteLLM deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the LiteLLM deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "masterkey":
    type: "string"
    description: "Value for Helm key 'masterkey'."

  "proxyConfigModelList":
    type: "any"
    description: "Value for Helm key 'proxy_config.model_list'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    masterkey: 'masterkey'
    proxyConfigModelList: 'proxy_config.model_list'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
