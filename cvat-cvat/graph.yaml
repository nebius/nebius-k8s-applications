releaseType: "k8s"
components:
  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        values.analytics.enabled: "parameters.analyticsEnabled"
        values.ingress.hostname: "parameters.ingressHostname"
        values.nfs.nfs_pv_size: "parameters.nfsNfsPvSize"
      componentSpec:
        productSlug: "nebius/cvat"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "cvat-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint: {}
parameters:
  "parentId":
    type: "string"
    description: "The project ID for the CVAT deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the CVAT deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the CVAT deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "analyticsEnabled":
    type: "bool"
    description: "Value for Helm key 'analytics.enabled'."

  "ingressHostname":
    type: "string"
    description: "Value for Helm key 'ingress.hostname'."

  "nfsNfsPvSize":
    type: "string"
    description: "Value for Helm key 'nfs.nfs_pv_size'."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    analyticsEnabled: 'analytics.enabled'
    ingressHostname: 'ingress.hostname'
    nfsNfsPvSize: 'nfs.nfs_pv_size'
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
