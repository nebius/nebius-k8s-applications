releaseType: "k8s"
components:
  endpoint001:
    type: "endpoint"
    spec:
      refMap:
        clusterId: "components.cluster001.state.result.id"
        helmReleaseName: "parameters.releaseName"
        helmReleaseNamespace: "parameters.releaseNamespace"
      componentSpec:
        ports: []
    dependencies:
      components:
        helmchart001:

  helmchart001:
    type: "helm_chart"
    spec:
      refMap:
        parentId: "parameters.parentId"
        clusterId: "components.cluster001.state.result.id"
        releaseName: "parameters.releaseName"
        releaseNamespace: "parameters.releaseNamespace"
        rawValues: "parameters.rawValues"
      componentSpec:
        productSlug: "nebius/kubernetes-dashboard"
    dependencies:
      components:
        cluster001:

  cluster001:
    type: "mk8s_cluster"
    spec:
      refMap:
        api_spec.metadata.parentId: "parameters.parentId"
        api_spec.metadata.id: "parameters.clusterId"
        api_spec.metadata.name: "parameters.clusterName"
      componentSpec:
        api_spec:
          metadata:
            name: "kubernetes-dashboard-cluster"
          spec:
            control_plane:
              # fill in subnetId with default value in the code
              endpoints:
                public_endpoint:


parameters:
  "parentId":
    type: "string"
    description: "The project ID for the Kubernetes Dashboard deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the Kubernetes Dashboard deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the Kubernetes Dashboard deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "rawValues":
    type: "string"
    description: "Helm values YAML (compose mode)."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
    rawValues: "setup.compose.data"
