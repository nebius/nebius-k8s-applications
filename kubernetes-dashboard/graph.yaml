releaseType: "k8s"
components:
  cluster001:
    type: "mk8s_cluster"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
          id: "${{ .parameters.clusterId }}"
          name: "${{ .parameters.clusterName }}"
        spec:
          control_plane:
            endpoints:
              public_endpoint: {}
  sa001:
    type: "service_account"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
          name: "kubernetes-dashboard-tunna-sa"
        spec:
          description: "Service account for Kubernetes Dashboard tunnel"
    dependencies:
      components:
        cluster001:

  member001:
    type: "group_membership"
    spec:
      serviceAccountId: "${{ .components.sa001.state.result.id }}"
      parentId: "${{ .parameters.parentId }}"
      groups: ["viewers"]
    dependencies:
      components:
        sa001:

  binding001:
    type: "access_binding"
    spec:
      api_spec:
        metadata:
          parentId: "${{ .parameters.parentId }}"
        spec:
          subjectId: "${{ .components.sa001.state.result.id }}"
          resourceId: "${{ .parameters.parentId }}"
          role: "applicationtunnel.agent"
    dependencies:
      components:
        sa001:

  rsakeypair001:
    type: "rsa_key_pair"
    spec:
      bitSize: 4096

  iamauthpubkey001:
    type: "iam_auth_public_key"
    spec:
      parentId: "${{ .parameters.parentId }}"
      serviceAccountId: "${{ .components.sa001.state.result.id }}"
      publicKey: "${{ .components.rsakeypair001.state.result.publicKey }}"
    dependencies:
      components:
        sa001:
        rsakeypair001:

  tunnel001:
    type: "application_tunnel"
    spec:
      parentId: "${{ .parameters.parentId }}"
      services:
        - "dashboard"

  endpoint001:
    type: "endpoint"
    spec:
      refMap:
        clusterId: "components.cluster001.state.result.id"
        helmReleaseName: "parameters.releaseName"
        helmReleaseNamespace: "parameters.releaseNamespace"
      componentSpec:
        ports: []
    dependencies:
      components:
        helmchart001:

  helmchart001:
    type: "helm_chart"
    spec:
      parentId: "${{ .parameters.parentId }}"
      clusterId: "${{ .components.cluster001.state.result.id }}"
      releaseName: "${{ .parameters.releaseName }}"
      releaseNamespace: "${{ .parameters.releaseNamespace }}"
      productSlug: "nebius/kubernetes-dashboard"
      values:
        tunna-agent:
          enabled: true
          config:
            tunnel_id: "${{ .components.tunnel001.state.result.tunnelId }}"
            server_addr: "${{ .components.tunnel001.state.result.address }}"
            iam:
              domain: "${{ .components.tunnel001.state.result.iamDomain }}"
              service_account:
                service_account_id: "${{ .components.sa001.state.result.id }}"
                public_key_id: "${{ .components.iamauthpubkey001.state.result.publicKeyId }}"
                private_key_path: "/etc/tunna/agent/sa/private_key.pem"
            services:
              - name: "dashboard"
                target: '${{ .parameters.releaseName }}-nginx:80'
                type: "http"
          secret:
            data:
              sa-private-key: "${{ .components.rsakeypair001.state.result.privateKey }}"
            items:
              - key: sa-private-key
                path: sa/private_key.pem
    dependencies:
      components:
        cluster001:
        tunnel001:
        rsakeypair001:
        iamauthpubkey001:
        binding001:
        member001:


parameters:
  "parentId":
    type: "string"
    description: "The project ID for the Kubernetes Dashboard deployment."

  "clusterId":
    type: "string"
    description: "Existing mk8s cluster ID for the Kubernetes Dashboard deployment."

  "clusterName":
    type: "string"
    description: "Existing mk8s cluster name for the Kubernetes Dashboard deployment."

  "releaseName":
    type: "string"
    description: "Helm release name."

  "releaseNamespace":
    type: "string"
    description: "Helm release namespace."

  "rawValues":
    type: "string"
    description: "Helm values YAML (compose mode)."

ui:
  mapping:
    clusterId: "mk8sCluster.clusterId"
    clusterName: "mk8sCluster.name"
    releaseName: "general.appname"
    releaseNamespace: "general.namespace"
    rawValues: "setup.compose.data"
