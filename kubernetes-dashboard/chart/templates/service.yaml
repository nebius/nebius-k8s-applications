apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nginx
  annotations:
    nebius.com/MarketplaceServiceAccess: title=Dashboard,ssl=false,type=web,port=http
spec:
  selector:
    app: {{ .Release.Name }}-nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: http
  type: ClusterIP
