  images: |
    - name: kubectl
      image: docker.io/bitnamilegacy/kubectl:1.29.2-debian-12-r3
    - name: os-shell
      image: docker.io/bitnamilegacy/os-shell:12-debian-12-r16
    - name: redis
      image: docker.io/bitnami/redis:latest
    - name: redis-exporter
      image: docker.io/bitnamilegacy/redis-exporter:1.58.0-debian-12-r4
    - name: redis-sentinel
      image: docker.io/bitnamilegacy/redis-sentinel:7.2.4-debian-12-r7
  licenses: Apache-2.0
