name: vllm
apiVersion: v2
description: A Helm chart for Kubernetes
type: application
version: 1.1.0
dependencies:
- name: kuberay-operator
  repository: file://./charts/kuberay-operator
  version: 1.2.2
- condition: gradio-ui.enabled
